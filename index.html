<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Екатерина Гитт — Методист образовательных программ</title>
  <meta
    name="description"
    content="Портфолио Екатерины Гитт — методист образовательных программ, проектирование образовательных продуктов, EdTech, IT и корпоративное обучение"
  />
  <style>
    :root{
      --bg:#f5f8f4;
      --card:#ffffff;
      --text:#1e2a24;
      --muted:#5e6f66;
      --line:#dfe9e2;
      --accent:#2f7d57;
      --accent-2:#72b88b;
      --accent-soft:#e9f5ee;
      --shadow:0 10px 30px rgba(31,67,48,.08);
      --radius:24px;
      --radius-sm:18px;
      --max:1180px;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 10% 0%,rgba(47,125,87,.10),transparent 60%),
        radial-gradient(900px 500px at 90% 10%,rgba(114,184,139,.14),transparent 50%),
        var(--bg);
      line-height:1.55;
    }

    a{color:inherit;text-decoration:none}
    img{max-width:100%;display:block}

    .wrap{
      max-width:var(--max);
      margin:0 auto;
      padding:0 20px;
    }

    .nav{
      position:sticky;
      top:0;
      z-index:30;
      backdrop-filter:blur(14px);
      background:rgba(245,248,244,.86);
      border-bottom:1px solid rgba(223,233,226,.9);
    }

    .nav .inner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:16px 0;
    }

    .brand{
      font-weight:800;
      letter-spacing:.2px;
    }

    .menu{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      color:var(--muted);
      font-size:14px;
    }

    .menu a:hover{color:var(--text)}

    .hero{
      padding:42px 0 24px;
    }

    .hero-grid{
      display:grid;
      grid-template-columns:1.12fr .88fr;
      gap:28px;
      align-items:stretch;
    }

    .hero-card,
    .section,
    .case,
    .quote,
    .gallery-card,
    .panel{
      background:rgba(255,255,255,.88);
      border:1px solid rgba(223,233,226,.95);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
    }

    .hero-card{
      padding:34px;
      min-height:520px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .eyebrow{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(47,125,87,.10);
      color:var(--accent);
      font-size:13px;
      font-weight:700;
    }

    h1{
      font-size:clamp(38px,5vw,62px);
      line-height:1.04;
      margin:18px 0 14px;
      letter-spacing:-.04em;
    }

    .hero-title-line{
      display:block;
      white-space:nowrap;
    }

    .lead{
      font-size:18px;
      color:var(--muted);
      max-width:720px;
    }

    .cta{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:22px;
    }

    .btn{
